<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Quantum Nuan | The Apex</title>
  <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    :root { 
        --lilac: #C8A2C8; 
        --lilac-glow: rgba(200, 162, 200, 0.6);
        --lilac-dim: rgba(200, 162, 200, 0.15);
        --bg: #030303; 
        --text: #eaeaea; 
    }
    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: pan-y; }

    body {
      background: var(--bg);
      color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; height: 100dvh; overflow: hidden; user-select: none;
      -webkit-font-smoothing: antialiased;
    }

    /* Ambient Noise Overlay */
    body::after {
      content: ""; position: fixed; inset: 0;
      background: url('data:image/svg+xml;utf8,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22n%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.9%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23n)%22 opacity=%220.04%22/%3E%3C/svg%3E');
      pointer-events: none; z-index: 9999; mix-blend-mode: overlay;
    }

    /* --- THE 3D WEBGL CANVAS --- */
    #webgl-canvas {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 7000; pointer-events: none;
    }

    /* --- THE QUANTUM DIAL HITBOX & HTML LABELS --- */
    #dial-hitbox {
        position: fixed; right: 0; top: 0; width: 150px; height: 100vh; z-index: 9000;
        touch-action: none; cursor: grab;
    }
    #dial-hitbox:active { cursor: grabbing; }

    #dial-ui-layer {
        position: fixed; right: -400px; top: 50%; margin-top: -350px;
        width: 700px; height: 700px; border-radius: 50%;
        z-index: 8000; pointer-events: none;
        will-change: transform;
    }

    .dial-label {
        position: absolute; top: 50%; left: 50%; width: 50%; height: 20px;
        transform-origin: 0% 50%; margin-top: -10px;
        display: flex; align-items: center; justify-content: flex-end;
        padding-right: 120px; /* Push text outside the 3D ring */
        font-size: 0.65rem; letter-spacing: 4px; text-transform: uppercase;
        color: rgba(255,255,255,0.3); transition: all 0.3s ease;
    }
    
    .dial-label span {
        transform: rotate(180deg); display: inline-block;
    }

    .dial-label.active {
        color: var(--lilac); font-weight: 600; text-shadow: 0 0 15px var(--lilac-glow);
    }

    /* --- VIEW CONTAINERS --- */
    .view-layer {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        opacity: 0; pointer-events: none; transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        z-index: 10; padding-right: 80px;
    }
    .view-layer.active { opacity: 1; pointer-events: auto; }

    /* Home View */
    .brand-title { font-size: 0.7rem; color: #555; letter-spacing: 8px; text-transform: uppercase; margin-bottom: 20px; }
    .brand-hero { font-size: 1.8rem; font-weight: 300; letter-spacing: 2px; color: var(--text); }
    .brand-hero span { color: var(--lilac); text-shadow: 0 0 20px var(--lilac-glow); }

    /* Shared Premium Elements */
    .glass-panel {
        background: linear-gradient(145deg, rgba(255,255,255,0.02) 0%, rgba(0,0,0,0.8) 100%);
        border: 1px solid rgba(255, 255, 255, 0.05); border-top: 1px solid var(--lilac-dim);
        box-shadow: 0 30px 60px rgba(0,0,0,0.9);
        backdrop-filter: blur(20px); padding: 30px; border-radius: 4px; text-align: center;
    }
    .btn-premium {
      background: transparent; border: 1px solid #333; color: #aaa;
      padding: 12px 30px; letter-spacing: 3px; text-transform: uppercase;
      cursor: pointer; transition: 0.4s; font-size: 0.65rem; margin-top: 15px;
    }
    .btn-premium:hover { border-color: var(--lilac); color: var(--lilac); box-shadow: 0 0 20px var(--lilac-dim); }

    /* Focus Trap View */
    .focus-timer { font-size: 3.5rem; font-weight: 200; font-variant-numeric: tabular-nums; letter-spacing: 2px; margin: 20px 0; color: #fff; }
    
    /* Cosmic Collision View */
    #cosmic-canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
    #cosmic-boundary {
        position: absolute; top: 50%; left: calc(50% - 40px); transform: translate(-50%, -50%);
        width: 350px; height: 350px; border-radius: 50%;
        border: 1px dashed rgba(200, 162, 200, 0.2); pointer-events: none;
    }
    
    .ripple {
        position: absolute; border: 2px solid var(--lilac); border-radius: 50%;
        transform: translate(-50%, -50%); pointer-events: none;
        animation: ripple-anim 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        box-shadow: 0 0 20px var(--lilac-glow), inset 0 0 10px var(--lilac-glow);
    }
    @keyframes ripple-anim { from { width: 0; height: 0; opacity: 1; } to { width: 500px; height: 500px; opacity: 0; } }

    /* Cosmic Tap Counter HUD */
    #cosmic-hud {
        position: absolute; bottom: 40px; left: calc(50% - 40px); transform: translateX(-50%);
        font-size: 0.5rem; letter-spacing: 4px; color: #555; text-transform: uppercase; text-align: center;
    }
    #cosmic-hud span { color: var(--lilac); font-weight: bold; }

  </style>
</head>
<body>

  <canvas id="webgl-canvas"></canvas>

  <canvas id="cosmic-canvas"></canvas>

  <div id="view-home" class="view-layer active">
      <div class="brand-title">Error 369</div>
      <div class="brand-hero">Something is being <span>built.</span></div>
  </div>

  <div id="view-wait" class="view-layer">
      <div class="glass-panel" style="width: 320px;">
        <div style="font-size: 0.5rem; color: #666; letter-spacing: 3px; text-transform: uppercase;">Current Apex</div>
        <div id="lobby-apex-name" style="font-size: 1.5rem; color: var(--lilac); margin: 10px 0;">Vacant</div>
        <button id="start-btn" class="btn-premium">Initiate Override</button>
      </div>
  </div>

  <div id="view-stop" class="view-layer">
      <div class="glass-panel" style="width: 350px;">
        <div style="font-size: 0.5rem; color: #666; letter-spacing: 3px; text-transform: uppercase;">Discipline Check</div>
        <div class="focus-timer" id="f-timer">00:00:0</div>
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button class="btn-premium" id="f-start">Start</button>
            <button class="btn-premium" id="f-stop">Snap</button>
        </div>
      </div>
  </div>

  <div id="view-cosmic" class="view-layer" style="pointer-events: auto;">
      <div id="cosmic-boundary"></div>
      <div id="cosmic-hud">Kinetic Taps: <span id="tap-display">0</span></div>
  </div>

  <div id="dial-hitbox"></div>
  <div id="dial-ui-layer">
      </div>

<script>
(() => {
    /* ==========================================
       1. THREE.JS LEGEND-LEVEL 3D DIAL
       ========================================== */
    const canvas3D = document.getElementById('webgl-canvas');
    const scene = new THREE.Scene();
    
    // Camera setup
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 50;
    
    const renderer = new THREE.WebGLRenderer({ canvas: canvas3D, alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    // Dial Group to hold 3D meshes
    const dialGroup = new THREE.Group();
    // Position it off-screen to the right, similar to the CSS version
    const offScreenRightX = (window.innerWidth / 30); // Rough approximation based on screen aspect
    dialGroup.position.set(offScreenRightX, 0, 0); 
    scene.add(dialGroup);

    // High-End Glass Material (MeshPhysicalMaterial)
    const glassMaterial = new THREE.MeshPhysicalMaterial({
        color: 0x000000,
        metalness: 0.9,
        roughness: 0.1,
        envMapIntensity: 1.0,
        clearcoat: 1.0,
        clearcoatRoughness: 0.1,
        transparent: true,
        opacity: 0.8,
    });

    // Outer Glass Torus
    const torusGeo = new THREE.TorusGeometry(20, 2, 32, 100);
    const outerTorus = new THREE.Mesh(torusGeo, glassMaterial);
    dialGroup.add(outerTorus);

    // Inner Glowing Lilac Wireframe Torus
    const wireGeo = new THREE.TorusGeometry(20, 0.5, 16, 50);
    const wireMat = new THREE.MeshBasicMaterial({ 
        color: 0xC8A2C8, // Lilac
        wireframe: true,
        transparent: true,
        opacity: 0.3
    });
    const innerTorus = new THREE.Mesh(wireGeo, wireMat);
    dialGroup.add(innerTorus);

    // Add a glowing core indicator on the left edge of the ring
    const coreGeo = new THREE.SphereGeometry(0.8, 16, 16);
    const coreMat = new THREE.MeshBasicMaterial({ color: 0xC8A2C8 });
    const coreIndicator = new THREE.Mesh(coreGeo, coreMat);
    coreIndicator.position.set(-20, 0, 0);
    dialGroup.add(coreIndicator);

    // Lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);
    const pointLight = new THREE.PointLight(0xC8A2C8, 2, 100);
    pointLight.position.set(-10, 0, 20);
    scene.add(pointLight);

    // Resize handler for Three.js
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        dialGroup.position.set(window.innerWidth / 30, 0, 0);
    });

    /* ==========================================
       2. UI SYNC & DRAG PHYSICS (Connect HTML to 3D)
       ========================================== */
    const dialUI = document.getElementById('dial-ui-layer');
    const hitbox = document.getElementById('dial-hitbox');
    const views = document.querySelectorAll('.view-layer');
    
    const menuItems = [
        { id: 'view-home', label: 'Home' },
        { id: 'view-wait', label: 'Wait With Us' },
        { id: 'view-stop', label: 'Stop Time' },
        { id: 'view-cosmic', label: 'Cosmic Collision' }
    ];

    let currentAngle = 0;
    const anglePerItem = 25; 
    let activeIndex = 0;

    // Generate HTML Labels over the 3D object
    menuItems.forEach((item, index) => {
        const label = document.createElement('div');
        label.className = 'dial-label';
        label.style.transform = `rotate(${index * anglePerItem + 180}deg)`;
        label.innerHTML = `<span>${item.label}</span>`;
        dialUI.appendChild(label);
    });

    function updateDialVisuals() {
        // Sync HTML
        dialUI.style.transform = `translateY(-50%) rotate(${currentAngle}deg)`;
        
        // Sync THREE.js object (convert deg to rad)
        dialGroup.rotation.z = -(currentAngle * Math.PI) / 180;

        let closestIndex = Math.round(-currentAngle / anglePerItem);
        if (closestIndex < 0) closestIndex = 0;
        if (closestIndex >= menuItems.length) closestIndex = menuItems.length - 1;

        if (closestIndex !== activeIndex) {
            activeIndex = closestIndex;
            
            document.querySelectorAll('.dial-label').forEach((el, i) => {
                if (i === activeIndex) el.classList.add('active');
                else el.classList.remove('active');
            });

            views.forEach(v => v.classList.remove('active'));
            document.getElementById(menuItems[activeIndex].id).classList.add('active');

            if(menuItems[activeIndex].id === 'view-cosmic') startCosmicMode();
            else stopCosmicMode();
        }
    }

    // Drag Physics
    let isDragging = false, velocity = 0, lastY = 0, animationFrame;

    function handleStart(y) {
        isDragging = true; lastY = y; velocity = 0;
        cancelAnimationFrame(animationFrame);
    }
    function handleMove(y) {
        if (!isDragging) return;
        const delta = y - lastY;
        lastY = y;
        currentAngle += delta * 0.2; // Dial sensitivity
        
        const maxAngle = 10;
        const minAngle = -(menuItems.length - 1) * anglePerItem - 10;
        if(currentAngle > maxAngle) currentAngle = maxAngle;
        if(currentAngle < minAngle) currentAngle = minAngle;

        updateDialVisuals();
    }
    function handleEnd() {
        isDragging = false;
        function momentumLoop() {
            const targetAngle = -activeIndex * anglePerItem;
            const diff = targetAngle - currentAngle;
            if (Math.abs(diff) < 0.1) {
                currentAngle = targetAngle; updateDialVisuals(); return;
            }
            currentAngle += diff * 0.15;
            updateDialVisuals();
            animationFrame = requestAnimationFrame(momentumLoop);
        }
        momentumLoop();
    }

    hitbox.addEventListener('touchstart', e => handleStart(e.touches[0].clientY));
    hitbox.addEventListener('touchmove', e => handleMove(e.touches[0].clientY));
    hitbox.addEventListener('touchend', handleEnd);
    hitbox.addEventListener('mousedown', e => handleStart(e.clientY));
    window.addEventListener('mousemove', e => { if(isDragging) handleMove(e.clientY); });
    window.addEventListener('mouseup', () => { if(isDragging) handleEnd(); });

    updateDialVisuals();


    /* ==========================================
       3. COSMIC COLLISION (EXACT TAP PROTOCOL)
       ========================================== */
    const canvas2D = document.getElementById('cosmic-canvas');
    const ctx = canvas2D.getContext('2d');
    const cosmicView = document.getElementById('view-cosmic');
    const tapDisplay = document.getElementById('tap-display');
    
    let balls = [];
    let cosmicLoop;
    let cosmicActive = false;
    let boundaryRadius = 175; 
    let tapCount = 0;
    
    function resizeCanvas2D() {
        canvas2D.width = window.innerWidth;
        canvas2D.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas2D);
    resizeCanvas2D();

    function startCosmicMode() { cosmicActive = true; runCosmicEngine(); }
    function stopCosmicMode() { cosmicActive = false; cancelAnimationFrame(cosmicLoop); }

    function createRipple(x, y) {
        const r = document.createElement('div');
        r.className = 'ripple';
        r.style.left = x + 'px'; r.style.top = y + 'px';
        cosmicView.appendChild(r);
        setTimeout(() => r.remove(), 1000);
    }

    function spawnBall(x, y) {
        balls.push({
            x: x, y: y, radius: 6,
            vx: (Math.random() - 0.5) * 8,
            vy: (Math.random() - 0.5) * 8
        });
    }

    // THE STRICT TAP PROTOCOL
    cosmicView.addEventListener('click', () => {
        if (!cosmicActive) return;
        
        tapCount++;
        tapDisplay.innerText = tapCount;

        const cx = (canvas2D.width / 2) - 40;
        const cy = canvas2D.height / 2;

        // Condition 1: 2 Taps -> Spawn Ripple & 1st Ball
        if (tapCount === 2 && balls.length === 0) {
            createRipple(cx, cy);
            spawnBall(cx, cy);
        }

        // Condition 2: 10 more taps (12 total) -> Mitosis into 2
        if (tapCount === 12 && balls.length === 1) {
            let original = balls[0];
            original.vx = -4; original.vy = -4; // Deflect original
            spawnBall(original.x, original.y);  // Birth second
            balls[1].vx = 4; balls[1].vy = 4;   // Shoot opposite
        }
    });

    function runCosmicEngine() {
        if(!cosmicActive) return;
        ctx.clearRect(0, 0, canvas2D.width, canvas2D.height);

        const offsetX = (canvas2D.width / 2) - 40; 
        const centerY = canvas2D.height / 2;
        
        const areaBoundary = Math.PI * (boundaryRadius * boundaryRadius);
        const areaBall = Math.PI * (6 * 6);
        const maxBalls = Math.floor((areaBoundary / areaBall) * 0.75);

        // Reset if full
        if(balls.length >= maxBalls && balls.length > 0) {
            ctx.fillStyle = 'rgba(200, 162, 200, 0.5)';
            ctx.fillRect(0,0, canvas2D.width, canvas2D.height);
            balls = [];
            tapCount = 0;
            tapDisplay.innerText = tapCount;
            return requestAnimationFrame(runCosmicEngine);
        }

        for (let i = 0; i < balls.length; i++) {
            let b = balls[i];
            b.x += b.vx; b.y += b.vy;

            const dx = b.x - offsetX;
            const dy = b.y - centerY;
            const dist = Math.hypot(dx, dy);

            if (dist + b.radius > boundaryRadius) {
                const angle = Math.atan2(dy, dx);
                b.vx = -Math.cos(angle) * Math.abs(b.vx);
                b.vy = -Math.sin(angle) * Math.abs(b.vy);
                b.x = offsetX + Math.cos(angle) * (boundaryRadius - b.radius);
                b.y = centerY + Math.sin(angle) * (boundaryRadius - b.radius);
            }

            // COLLISION MITOSIS LOGIC (Only triggers when there are >= 2 balls)
            for (let j = i + 1; j < balls.length; j++) {
                let b2 = balls[j];
                let distBalls = Math.hypot(b.x - b2.x, b.y - b2.y);
                
                if (distBalls < b.radius + b2.radius) {
                    b.vx *= -1; b.vy *= -1;
                    b2.vx *= -1; b2.vy *= -1;
                    
                    // Mitosis on collision! (Limit spawn rate slightly for performance)
                    if(balls.length < maxBalls && Math.random() > 0.3) {
                        spawnBall(b.x, b.y);
                    }
                }
            }

            ctx.beginPath();
            ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#C8A2C8';
            ctx.shadowBlur = 8;
            ctx.shadowColor = 'rgba(200, 162, 200, 0.8)';
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        cosmicLoop = requestAnimationFrame(runCosmicEngine);
    }

    /* ==========================================
       4. THREE.JS RENDER LOOP
       ========================================== */
    function render3D() {
        requestAnimationFrame(render3D);
        innerTorus.rotation.y += 0.005; // Idle floating animation
        innerTorus.rotation.x += 0.002;
        renderer.render(scene, camera);
    }
    render3D();


    /* ==========================================
       5. TIME STOP & WAIT WITH US LOGIC
       ========================================== */
    let fStartTime, fTimerInterval, fIsRunning = false;
    const fTimerDisplay = document.getElementById('f-timer');
    
    document.getElementById('f-start').addEventListener('click', () => {
        if (!fIsRunning) {
            fIsRunning = true; fStartTime = performance.now();
            fTimerInterval = requestAnimationFrame(function update() {
                let ms = performance.now() - fStartTime;
                fTimerDisplay.textContent = `${Math.floor(ms/1000).toString().padStart(2,'0')}:${Math.floor((ms%1000)/10).toString().padStart(2,'0')}:${Math.floor(ms%10)}`;
                fTimerInterval = requestAnimationFrame(update);
            });
        }
    });

    document.getElementById('f-stop').addEventListener('click', () => {
        if (fIsRunning) {
            fIsRunning = false; cancelAnimationFrame(fTimerInterval);
            if(fTimerDisplay.textContent.startsWith("10:00")) confetti({colors: ['#C8A2C8', '#fff']});
        }
    });

})();
</script>
</body>
</html>
