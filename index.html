<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Quantum Nuan | The Apex</title>
  
  <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  
  <style>
    /* ==========================================
       1. CORE DESIGN TOKENS (QUIET LUXURY)
       ========================================== */
    :root { 
        --lilac: #C8A2C8; 
        --lilac-glow: rgba(200, 162, 200, 0.5);
        --lilac-dim: rgba(200, 162, 200, 0.15);
        --bg: #030303; 
        --text: #eaeaea; 
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }

    body {
      background: var(--bg); color: var(--text); 
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      overflow: hidden; height: 100vh; width: 100vw; 
      display: flex; align-items: center; justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    /* Cinematic Noise Overlay */
    body::after {
      content: ""; position: fixed; inset: 0;
      background: url('data:image/svg+xml;utf8,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22n%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.9%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23n)%22 opacity=%220.04%22/%3E%3C/svg%3E');
      pointer-events: none; z-index: 9999; mix-blend-mode: overlay;
    }

    /* ==========================================
       2. THE ROPE & HEADER
       ========================================== */
    #rope-layer { 
        position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; 
        z-index: 1; pointer-events: none; transition: opacity 0.5s ease;
    }
    #rope-path { 
        fill: none; stroke: var(--lilac-dim); stroke-width: 1.5px; 
        stroke-linecap: round; filter: drop-shadow(0 0 5px var(--lilac-glow)); 
    }

    #header-container {
        position: absolute; z-index: 100; cursor: grab; 
        display: flex; flex-direction: column; align-items: center;
        will-change: transform; user-select: none;
    }
    #header-container:active { cursor: grabbing; }
    
    .code { 
        color: #555; font-size: 0.7rem; letter-spacing: 8px; 
        text-transform: uppercase; margin-bottom: 5px; pointer-events: none; 
    }
    .title { 
        font-size: 1.5rem; font-weight: 300; letter-spacing: 2px; color: var(--lilac); 
        animation: slowBlink 4s ease-in-out infinite; 
        text-shadow: 0 0 15px var(--lilac-glow); pointer-events: none;
    }
    @keyframes slowBlink { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

    /* ==========================================
       3. THE JOG WHEEL (RESPONSIVE)
       ========================================== */
    #wheel-container {
        position: absolute; right: -50vw; /* Hidden by default, JS calculates exact bounds */
        top: 50%; 
        width: clamp(300px, 80vmin, 500px); 
        height: clamp(300px, 80vmin, 500px); 
        transform: translateY(-50%);
        border-radius: 50%; z-index: 90;
        background: radial-gradient(circle at center, rgba(0,0,0,0.8) 0%, rgba(20,20,20,0.9) 100%);
        box-shadow: -10px 0 30px rgba(0,0,0,0.9), inset 2px 0 15px rgba(200, 162, 200, 0.05);
        border-left: 1px solid var(--lilac-dim);
        will-change: transform; display: flex; align-items: center; justify-content: center;
    }
    
    #wheel-svg { 
        width: 100%; height: 100%; transform: rotate(-90deg); 
        transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); 
    }
    .wheel-sector {
        fill: transparent; stroke: rgba(255,255,255,0.02); stroke-width: 250; 
        stroke-dasharray: 261.8 1000; cursor: pointer; transition: stroke 0.3s ease;
    }
    .wheel-sector:hover { stroke: rgba(200, 162, 200, 0.1); }
    .wheel-sector.active { stroke: rgba(200, 162, 200, 0.2); }
    
    .wheel-label-wrapper { 
        position: absolute; width: 100%; height: 100%; pointer-events: none; 
        transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); 
    }
    .wheel-text { 
        position: absolute; top: 50%; left: 15%; margin-top: -10px; width: 40%; text-align: left;
        font-size: clamp(0.45rem, 1.5vw, 0.55rem); letter-spacing: 4px; 
        text-transform: uppercase; color: #666; transition: 0.3s;
    }
    .wheel-text.active { color: var(--lilac); font-weight: bold; text-shadow: 0 0 10px var(--lilac-glow); }

    /* ==========================================
       4. CONTENT STAGE & VIEWS
       ========================================== */
    #content-stage {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        width: 100%; max-width: 600px; height: 60vh; z-index: 50;
        display: flex; align-items: center; justify-content: center; pointer-events: none;
    }
    .view-layer { 
        opacity: 0; position: absolute; transition: opacity 0.5s ease; width: 100%; 
        display: flex; flex-direction: column; align-items: center; pointer-events: none; 
    }
    .view-layer.active { opacity: 1; pointer-events: none; } /* Wrapper ignores clicks */

    /* Glass Panels & Buttons restore pointer events */
    .glass-panel, .instruction-text, .btn-premium { pointer-events: auto; }

    .glass-panel { 
        background: linear-gradient(145deg, rgba(255,255,255,0.02) 0%, rgba(0,0,0,0.8) 100%); 
        border: 1px solid rgba(255, 255, 255, 0.05); border-top: 1px solid var(--lilac-dim); 
        box-shadow: 0 30px 60px rgba(0,0,0,0.9); backdrop-filter: blur(20px); 
        padding: 30px; border-radius: 4px; text-align: center; 
    }
    .btn-premium { 
        background: transparent; border: 1px solid #333; color: #aaa; padding: 12px 30px; 
        letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: 0.4s; 
        font-size: 0.65rem; margin-top: 15px; 
    }
    .btn-premium:hover { border-color: var(--lilac); color: var(--lilac); box-shadow: 0 0 20px var(--lilac-dim); }

    /* Wait With Us */
    .apex-current-name { font-size: 1.5rem; color: var(--lilac); letter-spacing: 2px; margin-top: 5px; text-shadow: 0 0 10px var(--lilac-glow); }
    .instruction-text { font-size: 0.55rem; color: #555; letter-spacing: 2px; text-transform: uppercase; margin-top: 30px; line-height: 1.8; text-align: left; border-left: 1px solid #333; padding-left: 15px;}

    /* Focus Trap View */
    .focus-timer { font-size: 3.5rem; font-weight: 200; font-variant-numeric: tabular-nums; letter-spacing: 2px; margin: 20px 0; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.1); }

    /* ==========================================
       5. COSMIC COLLISION OVERLAYS
       ========================================== */
    #cosmic-canvas { 
        position: fixed; inset: 0; z-index: 40; pointer-events: none; opacity: 0; 
        transition: opacity 0.5s ease; cursor: crosshair;
    }
    #cosmic-boundary { 
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
        width: min(85vw, 400px); height: min(85vw, 400px); 
        border-radius: 50%; border: 1px dashed rgba(200, 162, 200, 0.2); 
        pointer-events: none; opacity: 0; transition: opacity 0.5s ease; z-index: 41; 
    }
    .ripple { 
        position: absolute; border: 1px solid var(--lilac); border-radius: 50%; 
        transform: translate(-50%, -50%); pointer-events: none; 
        animation: ripple-anim 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        box-shadow: 0 0 30px var(--lilac-glow), inset 0 0 20px var(--lilac-glow); z-index: 42;
    }
    @keyframes ripple-anim { from { width: 0; height: 0; opacity: 1; } to { width: clamp(300px, 60vw, 500px); height: clamp(300px, 60vw, 500px); opacity: 0; } }

    /* ==========================================
       6. GUNJS APEX ROOM
       ========================================== */
    #wait-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: var(--bg); flex-direction: column; align-items: center; justify-content: center; }
    .glass-stage { position: relative; width: 85vw; max-width: 420px; height: 65vh; max-height: 580px; background: linear-gradient(145deg, rgba(255,255,255,0.02) 0%, rgba(0,0,0,0.5) 100%); border-top: 1px solid rgba(200, 162, 200, 0.3); border-left: 1px solid rgba(200, 162, 200, 0.1); border-radius: 4px; box-shadow: 0 40px 100px rgba(0,0,0,0.9); overflow: hidden; }
    #bouncing-box { position: absolute; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; z-index: 2; top: 0; left: 0; }
    .core-handle-text { position: absolute; font-size: 0.4rem; color: var(--lilac); letter-spacing: 1px; text-transform: uppercase; bottom: -15px; }
    .core-inner, .core-outer { position: absolute; border: 1px solid var(--lilac); box-shadow: 0 0 10px var(--lilac-glow); }
    .core-inner { width: 60%; height: 60%; animation: spin 4s linear infinite; }
    .core-outer { width: 100%; height: 100%; animation: spinReverse 8s linear infinite; opacity: 0.3; }
    @keyframes spin { 100% { transform: rotate(360deg); } } @keyframes spinReverse { 100% { transform: rotate(-360deg); } }

  </style>
</head>
<body>

  <svg id="rope-layer"><path id="rope-path" d=""></path></svg>

  <canvas id="cosmic-canvas"></canvas>
  <div id="cosmic-boundary"></div>

  <div id="header-container">
      <div class="code">Error 369</div>
      <div class="title">Something is being built.</div>
  </div>

  <div id="wheel-container">
      <svg id="wheel-svg" viewBox="0 0 250 250">
          <circle cx="125" cy="125" r="125" fill="transparent" />
          <circle class="wheel-sector" cx="125" cy="125" r="62.5" stroke-dasharray="130.9 400" stroke-dashoffset="0" />
          <circle class="wheel-sector" cx="125" cy="125" r="62.5" stroke-dasharray="130.9 400" stroke-dashoffset="-130.9" />
          <circle class="wheel-sector" cx="125" cy="125" r="62.5" stroke-dasharray="130.9 400" stroke-dashoffset="-261.8" />
      </svg>
      <div class="wheel-label-wrapper" id="labels-wrapper">
          <div class="wheel-text active">Wait With Us</div>
          <div class="wheel-text">Stop Time</div>
          <div class="wheel-text">Cosmic Collision</div>
      </div>
  </div>

  <div id="content-stage">
      
      <div id="view-wait" class="view-layer">
          <div class="glass-panel" style="width: min(90vw, 320px);">
            <div style="font-size: 0.5rem; color: #666; letter-spacing: 3px; text-transform: uppercase;">Current Apex</div>
            <div id="lobby-apex-name" class="apex-current-name">Vacant</div>
            <button id="start-btn" class="btn-premium">Initiate Override</button>
            <div class="instruction-text">
                01. Enter your handle.<br>
                02. Surpass the apex.<br>
                03. Patience is currency.
            </div>
          </div>
      </div>

      <div id="view-stop" class="view-layer">
          <div class="glass-panel" style="width: min(90vw, 350px);">
            <div style="font-size: 0.5rem; color: #555; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px;">Discipline Check</div>
            <div class="focus-timer" id="f-timer">00:00:0</div>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="btn-premium" id="f-start">Start</button>
                <button class="btn-premium" id="f-stop">Snap</button>
                <button class="btn-premium" id="f-reset">Reset</button>
            </div>
            <div id="focus-message" style="margin-top: 15px; font-size: 0.6rem; color: var(--lilac);"></div>
          </div>
      </div>

      <div id="view-cosmic" class="view-layer">
          <div class="instruction-text" style="text-align: center; border: none; padding: 0;">
              Tap center to trigger Ripple.<br>
              Mitosis follows.
          </div>
      </div>
  </div>

  <div id="wait-overlay">
    <div class="stage-wrapper" id="stage-wrapper">
      <div class="glass-stage" id="stage">
        <div style="position: absolute; top: 25px; right: 25px; text-align: right;">
          <div style="font-size: 0.75rem; color: #fff; letter-spacing: 2px;" id="display-handle">Vacant</div>
          <div style="font-size: 0.85rem; color: var(--lilac); font-family: monospace;" id="display-time">0:00</div>
        </div>
        <div id="bouncing-box"><div class="core-outer"></div><div class="core-inner"></div><div class="core-handle-text" id="core-name-tag">@vacant</div></div>
      </div>
    </div>
    <div style="position: absolute; bottom: 30px; display: flex; flex-direction: column; align-items: center; gap: 10px;">
      <button class="btn-premium" id="buy-btn" style="font-size: 0.5rem;">Show Your Handle</button>
    </div>
  </div>


<script>
(() => {
    // ==========================================
    // 1. STATE & GARBAGE COLLECTION
    // ==========================================
    let activeMode = -1; 
    
    function cleanupActiveTasks() {
        stopCosmic();
        if (fRunning) { fRunning = false; cancelAnimationFrame(fTimer); }
        if (myTimer) { clearInterval(myTimer); myTimer = null; }
        if (boxAnimFrame) { cancelAnimationFrame(boxAnimFrame); boxAnimFrame = null; }
        document.getElementById('wait-overlay').style.display = 'none';
    }

    // ==========================================
    // 2. TETHER PHYSICS & DRAG LOGIC
    // ==========================================
    const header = document.getElementById('header-container');
    const wheel = document.getElementById('wheel-container');
    const ropePath = document.getElementById('rope-path');
    
    let wheelRadius = wheel.offsetWidth / 2;
    let wheelHiddenX = window.innerWidth + wheelRadius;
    let wheelVisibleX = window.innerWidth - (wheelRadius * 0.7); 
    const slackLength = 150; 
    
    let hx = window.innerWidth / 2, hy = window.innerHeight / 2; 
    let tx = hx, ty = hy; 
    let wx = wheelHiddenX, wtx = wheelHiddenX; 
    
    let isDragging = false, wheelLocked = false;
    let dragOffsetX = 0, dragOffsetY = 0;

    window.addEventListener('resize', () => {
        wheelRadius = wheel.offsetWidth / 2;
        wheelHiddenX = window.innerWidth + wheelRadius;
        wheelVisibleX = window.innerWidth - (wheelRadius * 0.7);
        
        if(!wheelLocked) wtx = wx = wheelHiddenX;
        else wtx = wx = wheelVisibleX;

        if (activeMode === -1) {
            tx = window.innerWidth / 2; ty = window.innerHeight / 2;
        } else {
            tx = window.innerWidth / 2; ty = 80; // Top margin
        }
        resizeCosmicCanvas();
    });
    
    function renderPhysics() {
        hx += (tx - hx) * (isDragging ? 0.8 : 0.1); 
        hy += (ty - hy) * (isDragging ? 0.8 : 0.1);
        header.style.transform = `translate(${hx - header.offsetWidth/2}px, ${hy - header.offsetHeight/2}px)`;

        wx += (wtx - wx) * 0.15;
        wheel.style.transform = `translateX(${wx - window.innerWidth}px)`;

        const startX = hx; const startY = hy;
        const endX = wx - wheelRadius; const endY = window.innerHeight / 2;
        const dist = Math.hypot(endX - startX, endY - startY);
        const slack = Math.max(0, slackLength - dist);
        const cpX = (startX + endX) / 2; const cpY = ((startY + endY) / 2) + slack; 

        if (activeMode !== -1) {
            ropePath.style.opacity = '0';
        } else {
            ropePath.style.opacity = '1';
            ropePath.setAttribute('d', `M ${startX} ${startY} Q ${cpX} ${cpY} ${endX} ${endY}`);
        }
        requestAnimationFrame(renderPhysics);
    }
    renderPhysics();

    header.addEventListener('pointerdown', (e) => {
        if(activeMode !== -1) return; 
        isDragging = true;
        dragOffsetX = hx - e.clientX; dragOffsetY = hy - e.clientY;
    });

    window.addEventListener('pointermove', (e) => {
        if (!isDragging) return;
        tx = e.clientX + dragOffsetX; ty = e.clientY + dragOffsetY;
        const distToEdge = window.innerWidth - tx;
        if (distToEdge > slackLength) {
            wtx = Math.max(wheelVisibleX, window.innerWidth - (distToEdge - slackLength));
        } else {
            wtx = wheelHiddenX;
        }
    });

    window.addEventListener('pointerup', () => {
        if (!isDragging) return;
        isDragging = false;
        if (wtx < window.innerWidth - 50) { wtx = wheelVisibleX; wheelLocked = true; } 
        else { wtx = wheelHiddenX; wheelLocked = false; }

        if (activeMode === -1) { tx = window.innerWidth / 2; ty = window.innerHeight / 2; }
    });

    // ==========================================
    // 3. RESPONSIVE JOG WHEEL
    // ==========================================
    const wheelSVG = document.getElementById('wheel-svg');
    const labelWrapper = document.getElementById('labels-wrapper');
    const sectors = document.querySelectorAll('.wheel-sector');
    const labels = document.querySelectorAll('.wheel-text');
    const views = document.querySelectorAll('.view-layer');

    labels.forEach((label, i) => { label.style.transform = `rotate(${i * 120}deg) translateX(-35%)`; });

    sectors.forEach((sector, i) => {
        sector.addEventListener('click', () => {
            if(!wheelLocked) return; 
            
            // Toggle OFF -> Return Home
            if (activeMode === i) {
                cleanupActiveTasks();
                activeMode = -1;
                sectors.forEach(s => s.classList.remove('active'));
                labels.forEach(l => l.classList.remove('active'));
                views.forEach(v => v.classList.remove('active'));
                tx = window.innerWidth / 2; ty = window.innerHeight / 2;
                return;
            }

            // Switch to new mode
            cleanupActiveTasks();
            activeMode = i;
            
            const rotation = -(i * 120);
            wheelSVG.style.transform = `rotate(${rotation - 90}deg)`; 
            labelWrapper.style.transform = `rotate(${rotation}deg)`;

            sectors.forEach(s => s.classList.remove('active'));
            labels.forEach(l => l.classList.remove('active'));
            sector.classList.add('active'); labels[i].classList.add('active');

            tx = window.innerWidth / 2; ty = 80; // Send Header Up

            views.forEach(v => v.classList.remove('active'));
            if(i === 0) document.getElementById('view-wait').classList.add('active');
            if(i === 1) document.getElementById('view-stop').classList.add('active');
            if(i === 2) { document.getElementById('view-cosmic').classList.add('active'); startCosmic(); }
        });
    });

    // ==========================================
    // 4. RETINA OPTIMIZED COSMIC ENGINE
    // ==========================================
    const cosmicCanvas = document.getElementById('cosmic-canvas');
    const ctx = cosmicCanvas.getContext('2d');
    const boundaryDiv = document.getElementById('cosmic-boundary');
    
    let balls = [];
    let isCosmicActive = false;
    let cosmicAnimationFrame;
    let arenaRadius = 0;

    function resizeCosmicCanvas() {
        const dpr = window.devicePixelRatio || 1;
        const rect = document.body.getBoundingClientRect();
        
        cosmicCanvas.width = rect.width * dpr;
        cosmicCanvas.height = rect.height * dpr;
        cosmicCanvas.style.width = `${rect.width}px`;
        cosmicCanvas.style.height = `${rect.height}px`;
        
        ctx.scale(dpr, dpr);
        arenaRadius = boundaryDiv.offsetWidth / 2;
    }

    function startCosmic() {
        isCosmicActive = true;
        resizeCosmicCanvas();
        cosmicCanvas.style.opacity = '1'; cosmicCanvas.style.pointerEvents = 'auto';
        boundaryDiv.style.opacity = '1';
        balls = [];
        if(!cosmicAnimationFrame) animateCosmic();
    }

    function stopCosmic() {
        isCosmicActive = false;
        cosmicCanvas.style.opacity = '0'; cosmicCanvas.style.pointerEvents = 'none';
        boundaryDiv.style.opacity = '0';
        if (cosmicAnimationFrame) cancelAnimationFrame(cosmicAnimationFrame);
        cosmicAnimationFrame = null;
    }

    cosmicCanvas.addEventListener('click', (e) => {
        if(!isCosmicActive || balls.length > 0) return; 
        
        const rect = cosmicCanvas.getBoundingClientRect();
        const tapX = e.clientX - rect.left; const tapY = e.clientY - rect.top;
        const cx = rect.width / 2; const cy = rect.height / 2;
        
        const distToCenter = Math.hypot(tapX - cx, tapY - cy);
        if (distToCenter > arenaRadius) return; // Strict validation

        const r = document.createElement('div');
        r.className = 'ripple'; r.style.left = cx + 'px'; r.style.top = cy + 'px';
        document.body.appendChild(r); setTimeout(() => r.remove(), 800);
        
        balls.push({ x: cx, y: cy, radius: 8, vx: 6, vy: 6 });
        balls.push({ x: cx, y: cy, radius: 8, vx: -6, vy: -6 });
    });

    function animateCosmic() {
        if (!isCosmicActive) return;
        const lw = cosmicCanvas.offsetWidth; const lh = cosmicCanvas.offsetHeight;
        ctx.clearRect(0, 0, lw, lh);

        const cx = lw / 2; const cy = lh / 2;
        
        const arenaArea = Math.PI * arenaRadius * arenaRadius;
        const ballArea = balls.length * Math.PI * 64; 
        if (ballArea > arenaArea * 0.75) {
            ctx.fillStyle = 'rgba(200, 162, 200, 0.8)';
            ctx.fillRect(0,0, lw, lh);
            balls = [];
            return requestAnimationFrame(animateCosmic);
        }

        let newborns = []; // Garbage safety array

        for (let i = 0; i < balls.length; i++) {
            let b = balls[i];
            b.x += b.vx; b.y += b.vy;

            // Escaped Bounds Safety Check
            const dx = b.x - cx; const dy = b.y - cy;
            const dist = Math.hypot(dx, dy);

            if (dist + b.radius > arenaRadius) {
                const nx = dx / dist; const ny = dy / dist;
                const dot = (b.vx * nx + b.vy * ny);
                b.vx -= 2 * dot * nx; b.vy -= 2 * dot * ny;
                b.x = cx + nx * (arenaRadius - b.radius - 1);
                b.y = cy + ny * (arenaRadius - b.radius - 1);
            }

            // Precise Overlap Mitosis Logic
            for (let j = i + 1; j < balls.length; j++) {
                let b2 = balls[j];
                const dxBalls = b.x - b2.x; const dyBalls = b.y - b2.y;
                const dBalls = Math.hypot(dxBalls, dyBalls);
                const overlap = (b.radius + b2.radius) - dBalls;
                
                if (overlap > 0) {
                    const nx = dxBalls / dBalls; const ny = dyBalls / dBalls;
                    b.x += nx * (overlap / 2 + 1); b.y += ny * (overlap / 2 + 1);
                    b2.x -= nx * (overlap / 2 + 1); b2.y -= ny * (overlap / 2 + 1);

                    const tempVx = b.vx; const tempVy = b.vy;
                    b.vx = b2.vx; b.vy = b2.vy;
                    b2.vx = tempVx; b2.vy = tempVy;
                    
                    if((balls.length + newborns.length) < 400) {
                        newborns.push({
                            x: (b.x + b2.x) / 2, y: (b.y + b2.y) / 2, radius: 8,
                            vx: (Math.random() - 0.5) * 12, vy: (Math.random() - 0.5) * 12
                        });
                    }
                }
            }

            ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#C8A2C8';
            ctx.shadowBlur = 10; ctx.shadowColor = 'rgba(200, 162, 200, 0.6)';
            ctx.fill(); ctx.shadowBlur = 0;
        }

        if(newborns.length > 0) balls.push(...newborns);
        cosmicAnimationFrame = requestAnimationFrame(animateCosmic);
    }

    // ==========================================
    // 5. FOCUS TRAP & GUN JS BACKEND
    // ==========================================
    let fStart, fTimer, fRunning = false;
    const fDisplay = document.getElementById('f-timer');
    
    document.getElementById('f-start').addEventListener('click', () => {
        if (!fRunning) { fRunning = true; fStart = performance.now();
            fTimer = requestAnimationFrame(function update() {
                let ms = performance.now() - fStart;
                fDisplay.textContent = `${Math.floor(ms/1000).toString().padStart(2,'0')}:${Math.floor((ms%1000)/10).toString().padStart(2,'0')}:${Math.floor(ms%10)}`;
                fTimer = requestAnimationFrame(update);
            });
        }
    });

    document.getElementById('f-stop').addEventListener('click', () => {
        if (fRunning) { fRunning = false; cancelAnimationFrame(fTimer);
            if(fDisplay.textContent.startsWith("10:00")) confetti({colors: ['#C8A2C8', '#fff']});
            else document.getElementById('focus-message').innerText = 'Focus Lost. Reset.';
        }
    });
    
    document.getElementById('f-reset').addEventListener('click', () => {
        fRunning = false; cancelAnimationFrame(fTimer);
        fDisplay.textContent = "00:00:0"; document.getElementById('focus-message').innerText = "";
    });

    const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
    const leaderNode = gun.get('quantum-nuan-apex-v8').get('apex');
    let bestSecs = 0, myTimer = null, mySecs = 0, boxAnimFrame;
    const bouncingBox = document.getElementById('bouncing-box'), stage = document.getElementById('stage');
    let ox = 0, oy = 0, odx = 2.2, ody = 1.4;

    leaderNode.on((data) => {
        if (data && data.seconds > bestSecs) {
            bestSecs = data.seconds;
            const handle = data.name.startsWith('@') ? data.name : '@' + data.name;
            document.getElementById('lobby-apex-name').innerText = handle;
            document.getElementById('display-handle').innerText = handle;
            document.getElementById('core-name-tag').innerText = handle;
            document.getElementById('display-time').innerText = `${Math.floor(bestSecs / 60)}:${(bestSecs % 60).toString().padStart(2, '0')}`;
        }
    });

    function animateBox() {
        const maxX = stage.clientWidth - 40, maxY = stage.clientHeight - 40;
        ox += odx; oy += ody;
        if (ox >= maxX || ox <= 0) odx = -odx;
        if (oy >= maxY || oy <= 0) ody = -ody;
        bouncingBox.style.transform = `translate3d(${ox}px, ${oy}px, 0)`;
        boxAnimFrame = requestAnimationFrame(animateBox);
    }

    document.getElementById('start-btn').addEventListener('click', () => {
        const h = prompt("Identity (@handle):");
        if (!h) return;
        document.getElementById('wait-overlay').style.display = 'flex';
        animateBox();
        myTimer = setInterval(() => { mySecs++; if (mySecs > bestSecs) leaderNode.put({ name: h, seconds: mySecs }); }, 1000);
    });

})();
</script>
</body>
</html>
