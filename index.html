<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quantum Nuan</title>
  <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
  <style>
    :root { --lilac: #d8b4fe; --dark-lilac: #9b72cf; --bg: #050505; }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg); color: #eaeaea;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; text-align: center; overflow: hidden; user-select: none;
    }

    /* --- THE LOBBY --- */
    .container { max-width: 500px; padding: 20px; z-index: 10; transition: opacity 0.8s ease; }
    .code { color: #555; font-size: 0.9rem; margin-bottom: 20px; letter-spacing: 1px; }
    h1 { font-weight: 500; font-size: 2rem; }
    p { color: #777; margin-top: 10px; }
    .prayer { margin-top: 30px; font-size: 0.85rem; color: #555; line-height: 1.6; }

    .btn-premium {
      margin-top: 40px; background: transparent; border: 1px solid #333; color: #777;
      padding: 12px 30px; letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; transition: 0.4s; border-radius: 4px; font-size: 0.75rem;
    }
    .btn-premium:hover { border-color: var(--lilac); color: var(--lilac); box-shadow: 0 0 15px rgba(216, 180, 254, 0.1); }

    .stats {
      position: fixed; bottom: 30px; font-size: 0.65rem;
      letter-spacing: 2px; color: #333; text-transform: uppercase;
      z-index: 10; transition: opacity 0.8s ease;
    }

    /* --- THE APEX ROOM --- */
    #wait-overlay {
      display: none; position: fixed; inset: 0; background: var(--bg);
      z-index: 9999; flex-direction: column; align-items: center; justify-content: center;
      opacity: 0; animation: cinematicFadeIn 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes cinematicFadeIn {
      0% { opacity: 0; transform: scale(0.98); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* The Containment Field */
    .glass-stage {
      position: relative;
      width: 85vw; max-width: 400px;
      height: 60vh; max-height: 600px;
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid rgba(216, 180, 254, 0.15);
      border-radius: 2px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(216, 180, 254, 0.02);
      backdrop-filter: blur(10px);
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }

    /* The Golden Ratio Slow Cube */
    #bouncing-box {
      position: absolute; width: 30px; height: 30px;
      background: rgba(216, 180, 254, 0.05); border: 1px solid var(--lilac);
      box-shadow: 0 0 15px rgba(216, 180, 254, 0.2);
      top: 50%; left: 50%; will-change: transform;
    }

    /* 3D Share Bookmark */
    .share-ribbon {
      position: absolute; top: 40px; left: -8px;
      background: var(--lilac); color: var(--bg);
      padding: 6px 16px 6px 20px; font-size: 0.55rem; font-weight: bold;
      letter-spacing: 3px; text-transform: uppercase; cursor: pointer;
      box-shadow: 4px 10px 20px rgba(0,0,0,0.5);
      border-top-right-radius: 2px; border-bottom-right-radius: 2px;
      transform-origin: left center; transform: perspective(200px) rotateY(15deg);
      transition: all 0.3s ease; z-index: 10;
    }
    .share-ribbon::before {
      content: ''; position: absolute; top: 100%; left: 0;
      border-top: 8px solid var(--dark-lilac); border-left: 8px solid transparent;
    }
    .share-ribbon:hover { transform: perspective(200px) rotateY(0deg) translateX(4px); }

    /* Top Right HUD (The Secret Trigger) */
    .record-hud {
      position: absolute; top: 20px; right: 20px;
      font-size: 0.65rem; color: #eaeaea; letter-spacing: 2px;
      text-transform: uppercase; cursor: default;
      text-shadow: 0 0 10px rgba(216, 180, 254, 0.2); z-index: 10;
    }

    .philosophy-text {
      position: absolute; bottom: 30px;
      color: #333; font-size: 0.55rem; letter-spacing: 6px; 
      text-transform: uppercase; text-align: center; pointer-events: none;
    }

    /* --- FOOTER (Monetization & Status) --- */
    .footer-dock {
      position: absolute; bottom: 30px; left: 0; width: 100%;
      display: flex; flex-direction: column; align-items: center; gap: 15px;
      opacity: 0; animation: fadeUp 2s 1s forwards;
    }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    .buy-throne-btn {
      background: none; border: 1px solid #222; color: #777;
      padding: 8px 24px; font-size: 0.55rem; letter-spacing: 3px;
      text-transform: uppercase; cursor: pointer; border-radius: 2px; transition: 0.4s;
    }
    .buy-throne-btn:hover { border-color: var(--lilac); color: var(--lilac); }

    .sponsor-tag {
      font-size: 0.5rem; color: #444; letter-spacing: 3px;
      text-transform: uppercase; text-decoration: none; transition: 0.3s;
    }
    .sponsor-tag:hover { color: var(--lilac); }
  </style>
</head>
<body>

  <div class="container" id="lobby">
    <div class="code">Error 369</div>
    <h1>Something is being built.</h1>
    <p>QuantumNuan is currently under Construction.</p>
    <div class="prayer">
      Pray for its early Revival.<br>
      We are counting on your prayers, here at QuantumNuan HQ.
    </div>
    <button id="start-btn" class="btn-premium">Prove Your Worth</button>
  </div>

  <div class="stats" id="lobby-stats">
    Watching: <span id="active-count">1</span> — Total: <span id="total-count">...</span>
  </div>

  <div id="wait-overlay">
    
    <div class="glass-stage" id="stage">
      <div class="share-ribbon" onclick="shareTrap()">Share</div>
      <div class="record-hud" id="god-trigger">Vacant : 0:00</div>
      
      <div id="bouncing-box"></div>
      
      <div class="philosophy-text">Time is an illusion.<br><br>Do not blink.</div>
    </div>

    <div class="footer-dock">
      <button class="buy-throne-btn" id="buy-btn">Buy Immortality (₹...)</button>
      <a href="https://x.com/quantumnuan" target="_blank" class="sponsor-tag">Advertise Here. DM @quantumnuan</a>
    </div>

  </div>

<script>
(() => {
    // 1. Core Network
    const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
    const db = gun.get('quantum-nuan-apex-v2'); 
    const leaderNode = db.get('apex');

    let bestSecs = 0; 
    let myTimer = null;
    let mySecs = 0;
    let boxAnimFrame;

    // 2. Local State & UI Sync
    const cachedLeader = JSON.parse(localStorage.getItem('qn-apex-v2'));
    if(cachedLeader) {
        bestSecs = cachedLeader.seconds;
        updateLeaderUI(cachedLeader.name, bestSecs);
    }

    leaderNode.on((data) => {
        if (data && data.seconds > bestSecs) {
            bestSecs = data.seconds;
            localStorage.setItem('qn-apex-v2', JSON.stringify(data));
            updateLeaderUI(data.name, bestSecs);
        }
    });

    db.get('stats').get('total').once((v) => db.get('stats').get('total').put((v || 0) + 1));
    db.get('stats').get('total').on((v) => document.getElementById('total-count').innerText = v);

    function updateLeaderUI(name, seconds) {
        document.getElementById('god-trigger').innerText = `${name} : ${formatTime(seconds)}`;
        const cost = seconds + 1;
        document.getElementById('buy-btn').innerText = `Buy Immortality (₹${cost})`;
    }

    function formatTime(s) {
        const m = Math.floor(s / 60);
        const sec = s % 60;
        return `${m}:${sec < 10 ? '0' : ''}${sec}`;
    }

    // 3. Golden Ratio Physics
    const box = document.getElementById('bouncing-box');
    const stage = document.getElementById('stage');
    
    // Position inside the relative container
    let x = 100; 
    let y = 100;
    
    // The Golden Ratio for mathematically uncertain movement
    const phi = 1.6180339887; 
    let dx = 0.8 * phi; // Slow, irregular X velocity
    let dy = 0.8;       // Slow Y velocity

    function animateBox() {
        // Calculate bounds dynamically based on the glass stage size
        const maxX = stage.clientWidth - 30; // 30 is box width
        const maxY = stage.clientHeight - 30;

        x += dx; y += dy;
        
        if (x >= maxX) { x = maxX; dx = -dx; }
        if (x <= 0) { x = 0; dx = -dx; }
        if (y >= maxY) { y = maxY; dy = -dy; }
        if (y <= 0) { y = 0; dy = -dy; }

        box.style.transform = `translate(${x}px, ${y}px)`;
        boxAnimFrame = requestAnimationFrame(animateBox);
    }

    // 4. Initialization
    document.getElementById('start-btn').addEventListener('click', () => {
        const h = prompt("Identity (@handle):");
        if (!h) return;
        
        const handle = h.startsWith('@') ? h : '@' + h;
        
        // Hide Lobby, Show Trap
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('lobby-stats').style.display = 'none';
        document.getElementById('wait-overlay').style.display = 'flex';
        
        mySecs = 0;
        
        // Initialize position based on rendered stage size
        x = Math.random() * (stage.clientWidth - 30);
        y = Math.random() * (stage.clientHeight - 30);
        animateBox();

        myTimer = setInterval(() => {
            mySecs++;
            if (mySecs > bestSecs) {
                leaderNode.put({ name: handle, seconds: mySecs });
            }
        }, 1000);
    });

    // 5. Commerce
    document.getElementById('buy-btn').addEventListener('click', () => {
        const cost = bestSecs + 1;
        const pitch = `Displace the current handle for ₹${cost}.\n\nClick OK to DM @quantumnuan for the private UPI link. Manual verification applies.`;
        if (confirm(pitch)) {
            window.open('https://x.com/quantumnuan', '_blank');
        }
    });

    // 6. The Share Web API
    window.shareTrap = async function() {
        const shareData = {
            title: 'QuantumNuan Room',
            text: 'I am trapped in the Apex Room. Do not blink.',
            url: window.location.href
        };
        try {
            if (navigator.share) {
                await navigator.share(shareData);
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert("Link copied to clipboard.");
            }
        } catch (err) {
            console.error('Share failed:', err);
        }
    };

    // 7. Guillotine (Anti-Cheat)
    document.addEventListener("visibilitychange", () => {
        if (document.hidden && myTimer) {
            cancelAnimationFrame(boxAnimFrame);
            location.reload();
        }
    });
    document.addEventListener('contextmenu', event => event.preventDefault());

    // 8. Phantom Touch (Wired to the Top Right HUD)
    let touchTimer;
    const triggerBtn = document.getElementById('god-trigger');

    const triggerAdmin = () => {
        const adminHandle = prompt("ADMIN: Exact paid @handle:");
        if(adminHandle) {
            const adminSecs = parseInt(prompt("ADMIN: Seconds to lock in:"), 10);
            if (!isNaN(adminSecs)) {
                leaderNode.put({ name: adminHandle, seconds: adminSecs });
                alert(`Locked. ${adminHandle} rules with ${adminSecs}s.`);
            }
        }
    };

    triggerBtn.addEventListener('touchstart', () => touchTimer = setTimeout(triggerAdmin, 20000));
    triggerBtn.addEventListener('mousedown', () => touchTimer = setTimeout(triggerAdmin, 20000));
    
    ['touchend', 'touchmove', 'mouseup', 'mouseleave'].forEach(evt => {
        triggerBtn.addEventListener(evt, () => clearTimeout(touchTimer));
    });
})();
</script>
</body>
</html>
