<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Quantum Nuan | The Apex</title>
  <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    :root { 
        --lilac: #d8b4fe; 
        --lilac-glow: rgba(216, 180, 254, 0.5);
        --lilac-dim: rgba(216, 180, 254, 0.1);
        --bg: #030303; 
        --text: #eaeaea; 
    }
    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: pan-y; }

    body {
      background: radial-gradient(circle at 30% 50%, #0a0a0a 0%, var(--bg) 100%);
      color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; height: 100dvh; overflow: hidden; user-select: none;
      -webkit-font-smoothing: antialiased;
    }

    /* Ambient Noise Overlay */
    body::after {
      content: ""; position: fixed; inset: 0;
      background: url('data:image/svg+xml;utf8,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22n%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.9%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23n)%22 opacity=%220.04%22/%3E%3C/svg%3E');
      pointer-events: none; z-index: 9999; mix-blend-mode: overlay;
    }

    /* --- THE QUANTUM DIAL (LEGEND LEVEL) --- */
    #dial-hitbox {
        position: fixed; right: 0; top: 0; width: 120px; height: 100vh; z-index: 9000;
        touch-action: none; cursor: grab;
    }
    #dial-hitbox:active { cursor: grabbing; }

    #quantum-dial {
        position: fixed;
        right: -400px; /* Hide center */
        top: 50%;
        margin-top: -350px;
        width: 700px; height: 700px;
        border-radius: 50%;
        border: 1px solid var(--lilac-dim);
        background: radial-gradient(circle at center, rgba(255,255,255,0.01) 0%, rgba(0,0,0,0.8) 100%);
        box-shadow: -20px 0 60px rgba(0,0,0,0.9), inset 20px 0 40px rgba(216, 180, 254, 0.03);
        backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        z-index: 8000;
        transition: transform 0.1s linear;
        will-change: transform;
    }

    /* Dial Ticks (Futuristic details) */
    .dial-tick {
        position: absolute; top: 50%; left: 50%; width: 50%; height: 2px;
        transform-origin: 0% 50%;
    }
    .dial-tick::after {
        content: ''; position: absolute; right: 0; top: 0; width: 10px; height: 2px;
        background: rgba(255,255,255,0.1);
    }

    .dial-label {
        position: absolute; top: 50%; left: 50%; width: 50%; height: 20px;
        transform-origin: 0% 50%; margin-top: -10px;
        display: flex; align-items: center; justify-content: flex-end;
        padding-right: 40px;
        font-size: 0.65rem; letter-spacing: 4px; text-transform: uppercase;
        color: #444; transition: all 0.3s ease;
    }
    
    .dial-label span {
        transform: rotate(180deg); /* Counter-rotate text so it faces correctly on the left arc */
        display: inline-block;
    }

    .dial-label.active {
        color: var(--lilac); font-weight: 600;
        text-shadow: 0 0 15px var(--lilac-glow);
    }

    /* --- VIEW CONTAINERS --- */
    .view-layer {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        opacity: 0; pointer-events: none; transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        z-index: 10; padding-right: 80px; /* Make room for dial */
    }
    .view-layer.active { opacity: 1; pointer-events: auto; }

    /* Home View */
    .brand-title { font-size: 0.7rem; color: #555; letter-spacing: 8px; text-transform: uppercase; margin-bottom: 20px; }
    .brand-hero { font-size: 1.8rem; font-weight: 300; letter-spacing: 2px; color: var(--text); }
    .brand-hero span { color: var(--lilac); text-shadow: 0 0 20px var(--lilac-glow); }

    /* Shared Premium Elements */
    .glass-panel {
        background: linear-gradient(145deg, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0.6) 100%);
        border: 1px solid rgba(255, 255, 255, 0.05); border-top: 1px solid var(--lilac-dim);
        box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        backdrop-filter: blur(15px); padding: 30px; border-radius: 4px; text-align: center;
    }
    .btn-premium {
      background: transparent; border: 1px solid #333; color: #aaa;
      padding: 12px 30px; letter-spacing: 3px; text-transform: uppercase;
      cursor: pointer; transition: 0.4s; font-size: 0.65rem; margin-top: 15px;
    }
    .btn-premium:hover { border-color: var(--lilac); color: var(--lilac); box-shadow: 0 0 20px var(--lilac-dim); }

    /* Focus Trap View */
    .focus-timer { font-size: 3.5rem; font-weight: 200; font-variant-numeric: tabular-nums; letter-spacing: 2px; margin: 20px 0; color: #fff; }
    
    /* Cosmic Collision View */
    #cosmic-canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
    #cosmic-boundary {
        position: absolute; top: 50%; left: calc(50% - 40px); transform: translate(-50%, -50%);
        width: 350px; height: 350px; border-radius: 50%;
        border: 1px dashed rgba(216, 180, 254, 0.2); pointer-events: none;
    }
    .sensor-auth-btn {
        pointer-events: auto; background: var(--lilac); color: #000; font-weight: bold;
        border: none; padding: 15px 40px; border-radius: 50px; font-size: 0.7rem; letter-spacing: 2px;
        text-transform: uppercase; box-shadow: 0 0 30px var(--lilac-glow); cursor: pointer;
        position: relative; z-index: 50;
    }
    
    .ripple {
        position: absolute; border: 1px solid var(--lilac); border-radius: 50%;
        transform: translate(-50%, -50%); pointer-events: none;
        animation: ripple-anim 0.8s ease-out forwards;
    }
    @keyframes ripple-anim { from { width: 0; height: 0; opacity: 1; } to { width: 400px; height: 400px; opacity: 0; } }

  </style>
</head>
<body>

  <canvas id="cosmic-canvas"></canvas>

  <div id="view-home" class="view-layer active">
      <div class="brand-title">Error 369</div>
      <div class="brand-hero">Something is being <span>built.</span></div>
  </div>

  <div id="view-wait" class="view-layer">
      <div class="glass-panel" style="width: 320px;">
        <div style="font-size: 0.5rem; color: #666; letter-spacing: 3px; text-transform: uppercase;">Current Apex</div>
        <div id="lobby-apex-name" style="font-size: 1.5rem; color: var(--lilac); margin: 10px 0;">Vacant</div>
        <button id="start-btn" class="btn-premium">Initiate Override</button>
      </div>
  </div>

  <div id="view-stop" class="view-layer">
      <div class="glass-panel" style="width: 350px;">
        <div style="font-size: 0.5rem; color: #666; letter-spacing: 3px; text-transform: uppercase;">Discipline Check</div>
        <div class="focus-timer" id="f-timer">00:00:0</div>
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button class="btn-premium" id="f-start">Start</button>
            <button class="btn-premium" id="f-stop">Snap</button>
        </div>
        <div id="focus-message" style="margin-top:20px; font-size:0.6rem; color:var(--lilac); text-transform:uppercase; letter-spacing:2px; height:15px;"></div>
      </div>
  </div>

  <div id="view-cosmic" class="view-layer" style="pointer-events: auto;">
      <div id="cosmic-boundary"></div>
      <button class="sensor-auth-btn" id="init-sensors">Initialize Sensors</button>
      <div id="cosmic-hint" style="display:none; position:absolute; bottom:50px; font-size:0.6rem; color:#666; letter-spacing:3px; text-transform:uppercase; text-align:center;">
          Shake Device <br> <span style="color:var(--lilac)">or tap anywhere to simulate</span>
      </div>
  </div>

  <div id="dial-hitbox"></div>
  <div id="quantum-dial">
      </div>

<script>
(() => {
    /* ==========================================
       1. QUANTUM DIAL PHYSICS (THE JOG WHEEL)
       ========================================== */
    const dial = document.getElementById('quantum-dial');
    const hitbox = document.getElementById('dial-hitbox');
    const views = document.querySelectorAll('.view-layer');
    
    const menuItems = [
        { id: 'view-home', label: 'Home' },
        { id: 'view-wait', label: 'Wait With Us' },
        { id: 'view-stop', label: 'Stop Time' },
        { id: 'view-cosmic', label: 'Cosmic Collision' }
    ];

    let currentAngle = 0;
    const anglePerItem = 25; // Degrees between each menu item
    let activeIndex = 0;

    // Generate DOM for Dial
    menuItems.forEach((item, index) => {
        // Aesthetic ticks
        const tick = document.createElement('div');
        tick.className = 'dial-tick';
        tick.style.transform = `rotate(${index * anglePerItem + 180}deg)`; // +180 to put on left side
        dial.appendChild(tick);

        // Labels
        const label = document.createElement('div');
        label.className = 'dial-label';
        label.style.transform = `rotate(${index * anglePerItem + 180}deg)`;
        label.innerHTML = `<span>${item.label}</span>`;
        label.id = `label-${index}`;
        dial.appendChild(label);
    });

    function updateDialVisuals() {
        dial.style.transform = `translateY(-50%) rotate(${currentAngle}deg)`;
        
        // Calculate which item is closest to the center (0 degrees relative to the left edge)
        // Since labels are placed at 180 + (i * 25), when currentAngle is rotated, 
        // the item physically on the left center is where: (i * 25) + currentAngle = 0
        let closestIndex = Math.round(-currentAngle / anglePerItem);
        
        // Clamp index
        if (closestIndex < 0) closestIndex = 0;
        if (closestIndex >= menuItems.length) closestIndex = menuItems.length - 1;

        if (closestIndex !== activeIndex) {
            activeIndex = closestIndex;
            
            // Update Active Label
            document.querySelectorAll('.dial-label').forEach((el, i) => {
                if (i === activeIndex) el.classList.add('active');
                else el.classList.remove('active');
            });

            // Update Views
            views.forEach(v => v.classList.remove('active'));
            document.getElementById(menuItems[activeIndex].id).classList.add('active');

            // Trigger specifics
            if(menuItems[activeIndex].id === 'view-cosmic') startCosmicMode();
            else stopCosmicMode();
        }
    }

    // Touch / Drag Physics
    let startY = 0, isDragging = false, velocity = 0, lastY = 0;
    let animationFrame;

    function handleStart(y) {
        isDragging = true;
        startY = y;
        lastY = y;
        velocity = 0;
        cancelAnimationFrame(animationFrame);
    }

    function handleMove(y) {
        if (!isDragging) return;
        const delta = y - lastY;
        lastY = y;
        velocity = delta; // Simple velocity tracking
        currentAngle += delta * 0.3; // Sensitivity
        
        // Hard limits so wheel doesn't spin forever
        const maxAngle = 10;
        const minAngle = -(menuItems.length - 1) * anglePerItem - 10;
        if(currentAngle > maxAngle) currentAngle = maxAngle;
        if(currentAngle < minAngle) currentAngle = minAngle;

        updateDialVisuals();
    }

    function handleEnd() {
        isDragging = false;
        // Snap to nearest item with easing
        function momentumLoop() {
            const targetAngle = -activeIndex * anglePerItem;
            const diff = targetAngle - currentAngle;
            
            if (Math.abs(diff) < 0.1) {
                currentAngle = targetAngle;
                updateDialVisuals();
                return;
            }
            
            currentAngle += diff * 0.1; // Ease out
            updateDialVisuals();
            animationFrame = requestAnimationFrame(momentumLoop);
        }
        momentumLoop();
    }

    // Event Listeners for Dial
    hitbox.addEventListener('touchstart', e => handleStart(e.touches[0].clientY));
    hitbox.addEventListener('touchmove', e => handleMove(e.touches[0].clientY));
    hitbox.addEventListener('touchend', handleEnd);
    
    hitbox.addEventListener('mousedown', e => handleStart(e.clientY));
    window.addEventListener('mousemove', e => { if(isDragging) handleMove(e.clientY); });
    window.addEventListener('mouseup', () => { if(isDragging) handleEnd(); });

    // Init first frame
    updateDialVisuals();


    /* ==========================================
       2. COSMIC COLLISION (FIXED & ROBUST)
       ========================================== */
    const canvas = document.getElementById('cosmic-canvas');
    const ctx = canvas.getContext('2d');
    const cosmicView = document.getElementById('view-cosmic');
    const authBtn = document.getElementById('init-sensors');
    const hint = document.getElementById('cosmic-hint');
    
    let balls = [];
    let cosmicLoop;
    let cosmicActive = false;
    let boundaryRadius = 175; // Matches 350px CSS boundary
    
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function startCosmicMode() {
        cosmicActive = true;
        if(balls.length > 0) runCosmicEngine();
    }
    function stopCosmicMode() {
        cosmicActive = false;
        cancelAnimationFrame(cosmicLoop);
    }

    // Spawn Logic
    function createRipple(x, y) {
        const r = document.createElement('div');
        r.className = 'ripple';
        r.style.left = x + 'px';
        r.style.top = y + 'px';
        cosmicView.appendChild(r);
        setTimeout(() => r.remove(), 800);
    }

    function spawnBall(x, y, isInitial = false) {
        balls.push({
            x: x, y: y,
            radius: 6,
            vx: (Math.random() - 0.5) * (isInitial ? 8 : 12), // High initial energy
            vy: (Math.random() - 0.5) * (isInitial ? 8 : 12)
        });
    }

    // Physics Engine
    function runCosmicEngine() {
        if(!cosmicActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;

        // Shift center slightly left to account for dial
        const offsetX = centerX - 40; 
        
        // Max capacity check (99% fill approximation)
        const areaBoundary = Math.PI * (boundaryRadius * boundaryRadius);
        const areaBall = Math.PI * (6 * 6);
        const maxBalls = Math.floor((areaBoundary / areaBall) * 0.75); // 75% packing limit

        if(balls.length >= maxBalls && balls.length > 0) {
            // Screen is full -> Reset!
            ctx.fillStyle = 'rgba(216, 180, 254, 0.5)';
            ctx.fillRect(0,0, canvas.width, canvas.height);
            balls = [];
            return requestAnimationFrame(runCosmicEngine);
        }

        for (let i = 0; i < balls.length; i++) {
            let b = balls[i];
            b.x += b.vx;
            b.y += b.vy;

            // Apply slight friction to calm them down over time
            b.vx *= 0.99; b.vy *= 0.99;

            // Circular Boundary Collision
            const dx = b.x - offsetX;
            const dy = b.y - centerY;
            const dist = Math.hypot(dx, dy);

            if (dist + b.radius > boundaryRadius) {
                // Bounce back toward center
                const angle = Math.atan2(dy, dx);
                b.vx = -Math.cos(angle) * Math.abs(b.vx);
                b.vy = -Math.sin(angle) * Math.abs(b.vy);
                // Keep inside
                b.x = offsetX + Math.cos(angle) * (boundaryRadius - b.radius);
                b.y = centerY + Math.sin(angle) * (boundaryRadius - b.radius);
            }

            // Ball to Ball Mitosis Collision
            for (let j = i + 1; j < balls.length; j++) {
                let b2 = balls[j];
                let distBalls = Math.hypot(b.x - b2.x, b.y - b2.y);
                
                if (distBalls < b.radius + b2.radius) {
                    // Deflect
                    b.vx *= -1; b.vy *= -1;
                    b2.vx *= -1; b2.vy *= -1;
                    
                    // Mitosis!
                    if(balls.length < maxBalls && Math.random() > 0.5) {
                        spawnBall(b.x, b.y);
                    }
                }
            }

            // Render
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#d8b4fe';
            ctx.shadowBlur = 8;
            ctx.shadowColor = 'var(--lilac)';
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        cosmicLoop = requestAnimationFrame(runCosmicEngine);
    }

    // Input Handling (Shake & Tap)
        function triggerShakeEvent() {
        const cx = (canvas.width / 2) - 40;
        const cy = canvas.height / 2;

        if (balls.length === 0) {
            createRipple(cx, cy);
            spawnBall(cx, cy, true);
            runCosmicEngine();
        } else {
            // Add massive energy on shake/tap
            balls.forEach(b => {
                b.vx += (Math.random() - 0.5) * 15;
                b.vy += (Math.random() - 0.5) * 15;
                
                // KINETIC MITOSIS: If it moves too fast, it splits from the energy
                if (Math.abs(b.vx) > 12 || Math.abs(b.vy) > 12) {
                    b.vx *= 0.5; // Dampen the speed of the original
                    b.vy *= 0.5;
                    spawnBall(b.x, b.y); // Birth a new one
                }
            });
        }
    }

    // Permission button for iOS / Sensors
    authBtn.addEventListener('click', async () => {
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            try {
                const state = await DeviceMotionEvent.requestPermission();
                if (state === 'granted') {
                    window.addEventListener('devicemotion', handleMotion);
                }
            } catch (e) { console.error(e); }
        } else {
            // Non iOS 13+ devices
            window.addEventListener('devicemotion', handleMotion);
        }
        
        authBtn.style.display = 'none';
        hint.style.display = 'block';
    });

    // Fallback: Tap anywhere on view to simulate shake
    cosmicView.addEventListener('click', (e) => {
        if(e.target === authBtn) return;
        triggerShakeEvent();
    });

    function handleMotion(e) {
        if(!cosmicActive || !e.accelerationIncludingGravity) return;
        const acc = e.accelerationIncludingGravity;
        const total = Math.abs(acc.x) + Math.abs(acc.y) + Math.abs(acc.z);
        // Gravity is ~9.8, so normal rest is ~10. Shake is > 25.
        if (total > 25) {
            triggerShakeEvent();
        }
    }


    /* ==========================================
       3. TIME STOP & WAIT WITH US LOGIC
       ========================================== */
    // Focus Trap
    let fStartTime, fTimerInterval, fIsRunning = false;
    const fTimerDisplay = document.getElementById('f-timer');
    
    document.getElementById('f-start').addEventListener('click', () => {
        if (!fIsRunning) {
            fIsRunning = true; fStartTime = performance.now();
            fTimerInterval = requestAnimationFrame(function update() {
                let ms = performance.now() - fStartTime;
                fTimerDisplay.textContent = `${Math.floor(ms/1000).toString().padStart(2,'0')}:${Math.floor((ms%1000)/10).toString().padStart(2,'0')}:${Math.floor(ms%10)}`;
                fTimerInterval = requestAnimationFrame(update);
            });
        }
    });

    document.getElementById('f-stop').addEventListener('click', () => {
        if (fIsRunning) {
            fIsRunning = false; cancelAnimationFrame(fTimerInterval);
            if(fTimerDisplay.textContent.startsWith("10:00")) confetti({colors: ['#d8b4fe', '#fff']});
        }
    });

})();
</script>
</body>
</html>
